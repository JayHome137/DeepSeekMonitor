name: DeepSeekMonitor
options:
  bundleIdPrefix: com.deepseek
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  DeepSeekMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources/DeepSeekMonitor
        excludes:
          - "WidgetSupport"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepseek.monitor
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: DeepSeekMonitor.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "DeepSeekMonitorDev"
        LSUIElement: true
        PRODUCT_NAME: DeepSeekMonitor
    dependencies:
      - target: WidgetSupport
        embed: true
    preBuildScripts:
      - name: "Kill previous process"
        script: |
          OLD_PID=$(pgrep -x "DeepSeekMonitor" 2>/dev/null || true)
          if [ -n "$OLD_PID" ]; then kill "$OLD_PID" 2>/dev/null || true; fi

  WidgetSupport:
    type: app-extension
    platform: macOS
    sources:
      - Sources/WidgetSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepseek.monitor.widget
        INFOPLIST_FILE: Sources/WidgetSupport/Info.plist
        CODE_SIGN_ENTITLEMENTS: DeepSeekMonitor.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "DeepSeekMonitorDev"
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: WidgetSupport
    dependencies:
      - framework: WidgetKit.framework
      - framework: SwiftUI.framework
